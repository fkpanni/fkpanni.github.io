<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fahd Khan // Portfolio Boot</title>
  <meta name="description" content="Fahd Khan developer portfolio launch page." />

  <style>
    :root {
      --bg: #050607;
      --panel: rgba(13, 17, 18, 0.92);
      --text: #e8fff1;
      --muted: #7c8f86;
      --green: #72ff9f;
      --green-soft: rgba(114, 255, 159, 0.18);
      --border: rgba(114, 255, 159, 0.25);
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 25% 20%, rgba(114, 255, 159, 0.08), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(114, 255, 159, 0.05), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(900px, 100%);
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow:
        0 0 40px rgba(114, 255, 159, 0.08),
        inset 0 0 30px rgba(114, 255, 159, 0.03);
      border-radius: 18px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 16px;
      border-bottom: 1px solid rgba(114, 255, 159, 0.15);
      background: rgba(255, 255, 255, 0.025);
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: var(--muted);
      opacity: 0.8;
    }

    .dot:nth-child(1) { background: #ff5f56; }
    .dot:nth-child(2) { background: #ffbd2e; }
    .dot:nth-child(3) { background: #27c93f; }

    .title {
      margin-left: 10px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    main {
      padding: clamp(22px, 4vw, 44px);
    }

    .identity {
      margin-bottom: 28px;
    }

    .kicker {
      color: var(--green);
      font-size: 14px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 800;
    }

    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      max-width: 650px;
      line-height: 1.6;
    }

    .terminal {
      margin-top: 30px;
      padding: 22px;
      border: 1px solid rgba(114, 255, 159, 0.18);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.32);
      min-height: 250px;
    }

    .line {
      min-height: 24px;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
    }

    .prompt {
      color: var(--green);
    }

    .muted {
      color: var(--muted);
    }

    .ok {
      color: var(--green);
    }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      background: var(--green);
      transform: translateY(3px);
      animation: blink 1s steps(1) infinite;
      margin-left: 3px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
      align-items: center;
    }

    button,
    a.button {
      border: 1px solid var(--border);
      background: var(--green-soft);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    button:hover,
    a.button:hover {
      transform: translateY(-1px);
      border-color: var(--green);
      background: rgba(114, 255, 159, 0.24);
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .footer {
      margin-top: 34px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid rgba(114, 255, 159, 0.12);
      padding-top: 18px;
    }

    .footer a {
      color: var(--green);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 560px) {
      body {
        padding: 12px;
      }

      main {
        padding: 22px;
      }

      .terminal {
        padding: 16px;
      }

      .actions {
        align-items: stretch;
      }

      button,
      a.button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <section class="shell" aria-label="Portfolio launch terminal">
    <div class="topbar">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="title">fahd@github-pages: ~/portfolio-launch</span>
    </div>

    <main>
      <section class="identity">
        <div class="kicker">FAHD KHAN // SOFTWARE DEV // CYBERSECURITY</div>
        <h1>initializing<br />portfolio</h1>
        <p class="subtitle">
          Lightweight GitHub Pages boot screen. Main portfolio runs on Vercel.
          Press Enter to open the full build.
        </p>
      </section>

      <section class="terminal" id="terminal" aria-live="polite"></section>

      <div class="actions">
        <button id="enterBtn" type="button">Enter Portfolio ↵</button>
        <a class="button" href="https://github.com/fkpanni" target="_blank" rel="noreferrer">GitHub</a>
        <a class="button" href="https://www.linkedin.com/in/fkpanni/" target="_blank" rel="noreferrer">LinkedIn</a>
        <span class="hint">Keyboard: press Enter</span>
      </div>

      <div class="footer">
        <span>fkpanni.github.io</span>
        <span>status: <span class="ok">ready</span></span>
      </div>
    </main>
  </section>

  <script>
    const PORTFOLIO_URL = "https://fkpanni.vercel.app";

    const terminal = document.getElementById("terminal");
    const enterBtn = document.getElementById("enterBtn");

    const lines = [
      ["$ boot fahd.os", 220],
      ["loading identity modules...", 360],
      ["✓ software development", 220],
      ["✓ cybersecurity", 220],
      ["✓ game-dev experiments", 220],
      ["✓ UI systems", 220],
      ["mounting project archive...", 320],
      ["connecting to Vercel deployment...", 420],
      ["portfolio route resolved.", 260],
      ["", 100],
      ["Press ENTER to continue →", 0]
    ];

    let lineIndex = 0;

    function appendLine(text = "") {
      const line = document.createElement("div");
      line.className = "line";

      if (text.startsWith("$")) {
        line.innerHTML = `<span class="prompt">${text}</span>`;
      } else if (text.startsWith("✓")) {
        line.innerHTML = `<span class="ok">${text}</span>`;
      } else if (text.includes("ENTER")) {
        line.innerHTML = `<span class="muted">${text}</span><span class="cursor"></span>`;
      } else {
        line.textContent = text;
      }

      terminal.appendChild(line);
    }

    function typeBoot() {
      if (lineIndex >= lines.length) return;

      const [text, delay] = lines[lineIndex];
      appendLine(text);
      lineIndex += 1;

      setTimeout(typeBoot, delay);
    }

    function openPortfolio() {
      if (PORTFOLIO_URL.includes("YOUR-PORTFOLIO-URL")) {
        alert("Replace PORTFOLIO_URL in index.html with your real Vercel link first.");
        return;
      }

      window.location.href = PORTFOLIO_URL;
    }

    enterBtn.addEventListener("click", openPortfolio);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        openPortfolio();
      }
    });

    typeBoot();
  </script>
</body>
</html>
